<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
  <title>小小英语乐园 🌈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

<body class="home-page">
  <div class="sky-bg">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    <div class="sun"></div>
  </div>

  <header class="header">
    <h1 class="title">🌈 小小英语乐园</h1>
    <p class="subtitle">点击分类，开始探索吧！</p>

  <main class="categories">

        <p>巴蒂 + 培生 · 6 个阶段</p>
      </div>
      <span class="badge">阅读计划</span>

    <a href="animals.html" class="category-card category-active">
      <div class="card-icon">🦁</div>
      <h2>动物</h2>
      <p>Animals</p>
      <span class="badge">55 种</span>

    <a href="fruits.html" class="category-card category-active">

    <a href="vegetables.html" class="category-card category-active">

      <h2>蔬菜</h2>
      <p>Vegetables</p>
      <span class="badge">20 种</span>
    </a>

    <a href="vehicles.html" class="category-card category-active">
      <div class="card-icon">🚗</div>
      <h2>车辆</h2>
      <p>Vehicles</p>
      <span class="badge">18 种</span>
    </a>

    <a href="family.html" class="category-card category-active">
      <div class="card-icon">👨‍👩‍👧</div>
      <h2>人物关系</h2>
      <p>Family</p>
      <span class="badge">15 种</span>
    </a>
  </main>

  <footer class="footer">
    <p>适合 4 岁小朋友的英语启蒙 🎈</p>
  </footer>

</html>
